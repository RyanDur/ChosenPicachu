name: CDN probe
on: workflow_dispatch
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe museum image CDNs from a runner
        run: |
          curl -s -o /dev/null -w "artic 400px:    %{http_code}\n" "https://www.artic.edu/iiif/2/bc4ad4ca-4cf7-cb90-0cc7-99f53ce361b4/full/400,/0/default.jpg" || true
          curl -s -o /dev/null -w "framemark 400:  %{http_code}\n" "https://framemark.vam.ac.uk/collections/2006AU1797/full/!400,400/0/default.jpg" || true
          curl -s -o /dev/null -w "harvard img:    %{http_code}\n" "https://nrs.harvard.edu/urn-3:HUAM:INV002307" || true
