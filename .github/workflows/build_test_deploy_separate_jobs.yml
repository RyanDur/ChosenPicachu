name: Build Test
on:
  push:
    branches:
      - main
env:
  VITE_APP_API_AIC: ${{ vars.VITE_APP_API_AIC }}
  VITE_APP_HARVARD_API: ${{ vars.VITE_APP_HARVARD_API }}
  VITE_APP_HARVARD_API_KEY: ${{ secrets.VITE_APP_HARVARD_API_KEY }}
  VITE_APP_VAM_API: ${{ vars.VITE_APP_VAM_API }}

jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
      - name: Build
        id: build
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm ci
          npm run lint
          npm run lint:css
          npm run build
      - name: Export env for test
        uses: cardinalby/export-env-action@v2
        with:
          mask: true
          envFile: '.env.test'
      - name: Test
        run: npm test
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist

  pages:
    needs: build_test
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist
      - name: SPA fallback
        run: cp ./dist/index.html ./dist/404.html
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  smoke:
    needs: pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
      - name: Install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm ci
      - name: Install browser
        run: npx playwright install --with-deps chromium
      - name: Smoke the deployed site
        run: npx playwright test

  lighthouse:
    needs: pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lighthouse audit of the deployed site
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://ryandur.github.io/ChosenPicachu/
            https://ryandur.github.io/ChosenPicachu/gallery?page=1&size=8&tab=vam
            https://ryandur.github.io/ChosenPicachu/users
          configPath: ./lighthouserc.json
          uploadArtifacts: true
